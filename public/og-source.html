<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1200" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: #1A1714;
    }

    .og {
      width: 1200px;
      height: 630px;
      background: #1A1714;
      display: flex;
      align-items: stretch;
      position: relative;
      overflow: hidden;
      font-family: 'DM Sans', system-ui, sans-serif;
    }

    /* ── Background decoration ── */
    .bg-glow-right {
      position: absolute;
      width: 900px; height: 900px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(196,123,48,0.13) 0%, transparent 60%);
      top: -300px; right: -200px;
      pointer-events: none;
    }

    .bg-glow-left {
      position: absolute;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(107,58,31,0.10) 0%, transparent 65%);
      bottom: -200px; left: 350px;
      pointer-events: none;
    }

    /* Subtle dot pattern */
    .dots {
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.055) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
    }

    /* Vertical divider */
    .divider {
      position: absolute;
      top: 60px; bottom: 60px;
      left: 600px;
      width: 1px;
      background: linear-gradient(to bottom, transparent, rgba(196,123,48,0.2) 30%, rgba(196,123,48,0.2) 70%, transparent);
    }

    /* ── LEFT: text content ── */
    .left {
      width: 600px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      padding: 58px 64px 52px 72px;
      position: relative;
      z-index: 1;
    }

    .top-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(196,123,48,0.1);
      border: 1px solid rgba(196,123,48,0.22);
      border-radius: 100px;
      padding: 6px 16px;
      width: fit-content;
      margin-bottom: 28px;
    }

    .label-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #C47B30;
      flex-shrink: 0;
    }

    .label-text {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      color: #D4904A;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .app-name {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 82px;
      font-weight: 700;
      color: #FAF7F2;
      letter-spacing: -0.03em;
      line-height: 1;
      margin-bottom: 14px;
    }

    .tagline {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 28px;
      font-weight: 700;
      font-style: italic;
      color: #C47B30;
      letter-spacing: -0.015em;
      line-height: 1.2;
      margin-bottom: 20px;
    }

    .sub {
      font-size: 17px;
      font-weight: 400;
      color: rgba(250,247,242,0.45);
      line-height: 1.6;
      max-width: 440px;
      margin-bottom: auto;
    }

    /* Rating + platforms */
    .bottom-row {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .stars-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .stars {
      font-size: 18px;
      color: #C47B30;
      letter-spacing: 2px;
    }

    .rating-text {
      font-size: 14px;
      font-weight: 600;
      color: rgba(250,247,242,0.55);
    }

    .platforms {
      display: flex;
      gap: 10px;
    }

    .platform-pill {
      display: flex;
      align-items: center;
      gap: 7px;
      background: rgba(250,247,242,0.06);
      border: 1px solid rgba(250,247,242,0.1);
      border-radius: 10px;
      padding: 9px 18px;
      font-size: 14px;
      font-weight: 600;
      color: rgba(250,247,242,0.7);
    }

    .platform-pill svg {
      width: 16px; height: 16px;
      flex-shrink: 0;
    }

    /* ── RIGHT: icon showcase ── */
    .right {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
    }

    .icon-stage {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Concentric glow rings */
    .ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(196,123,48,0.15);
    }
    .ring-1 { width: 280px; height: 280px; }
    .ring-2 { width: 340px; height: 340px; border-color: rgba(196,123,48,0.08); }
    .ring-3 { width: 400px; height: 400px; border-color: rgba(196,123,48,0.04); }

    .icon-glow {
      position: absolute;
      width: 240px; height: 240px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(196,123,48,0.22) 0%, transparent 70%);
    }

    /* App icon */
    .app-icon {
      position: relative;
      width: 180px; height: 180px;
      border-radius: 40px;
      background: #F9F5EF;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.12),
        0 24px 60px rgba(0,0,0,0.5),
        0 0 80px rgba(196,123,48,0.18);
    }

    .app-icon img {
      width: 116px; height: 116px;
      object-fit: contain;
    }

    /* Floating feature chips */
    .chip {
      position: absolute;
      background: rgba(26,23,20,0.92);
      border: 1px solid rgba(196,123,48,0.25);
      border-radius: 12px;
      padding: 10px 16px;
      white-space: nowrap;
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .chip-icon { font-size: 16px; }

    .chip-text {
      font-size: 13px;
      font-weight: 600;
      color: rgba(250,247,242,0.85);
    }

    .chip-sub {
      font-size: 11px;
      color: rgba(250,247,242,0.38);
      font-family: 'DM Mono', monospace;
    }

    /* Chips positioned relative to .right (600×630) — icon center ~(300,315), icon 180×180 */
    .chip-1 { top: 52px;  right: 30px; }                              /* above icon, top-right */
    .chip-2 { bottom: 58px; left: 28px; }                             /* below-left of icon    */
    .chip-3 { top: 50%; right: 22px; transform: translateY(-50%); }   /* right of icon, center */

    /* URL watermark */
    .url-watermark {
      position: absolute;
      bottom: 28px;
      right: 36px;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: rgba(250,247,242,0.2);
      letter-spacing: 0.04em;
      z-index: 1;
    }
  </style>
</head>
<body>
  <div class="og">
    <!-- Background -->
    <div class="bg-glow-right"></div>
    <div class="bg-glow-left"></div>
    <div class="dots"></div>
    <div class="divider"></div>

    <!-- Left: copy -->
    <div class="left">
      <div class="top-label">
        <span class="label-dot"></span>
        <span class="label-text">Coffee Journal App</span>
      </div>

      <div class="app-name">Brewio</div>
      <div class="tagline">Every cup tells a story.</div>
      <p class="sub">Log your brews, time pour-overs, calculate ratios, and discover your perfect cup.</p>

      <div class="bottom-row">
        <div class="stars-row">
          <span class="stars">★★★★★</span>
          <span class="rating-text">4.8 · Free to download</span>
        </div>
        <div class="platforms">
          <div class="platform-pill">
            <!-- Apple logo -->
            <svg viewBox="0 0 24 24" fill="currentColor" style="color:rgba(250,247,242,0.7)">
              <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
            </svg>
            App Store
          </div>
          <div class="platform-pill">
            <!-- Google Play triangle -->
            <svg viewBox="0 0 24 24" fill="none" style="color:rgba(250,247,242,0.7)">
              <path d="M5 3.5L19 12 5 20.5V3.5Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
            </svg>
            Google Play
          </div>
        </div>
      </div>
    </div>

    <!-- Right: icon showcase -->
    <div class="right">
      <!-- Icon + rings, no chips inside -->
      <div class="icon-stage">
        <div class="ring ring-3"></div>
        <div class="ring ring-2"></div>
        <div class="ring ring-1"></div>
        <div class="icon-glow"></div>
        <div class="app-icon">
          <img src="/brewio-logo.png" alt="Brewio" />
        </div>
      </div>

      <!-- Chips positioned relative to .right, outside the icon -->
      <div class="chip chip-1">
        <span class="chip-icon">⏱</span>
        <div>
          <div class="chip-text">Brew Timer</div>
          <div class="chip-sub">Step-by-step</div>
        </div>
      </div>

      <div class="chip chip-2">
        <span class="chip-icon">☕</span>
        <div>
          <div class="chip-text">12 Methods</div>
          <div class="chip-sub">V60, Espresso…</div>
        </div>
      </div>

      <div class="chip chip-3">
        <span class="chip-icon">📊</span>
        <div>
          <div class="chip-text">Ratio Calc</div>
          <div class="chip-sub">EY% · TDS%</div>
        </div>
      </div>
    </div>

    <div class="url-watermark">brewio.app</div>
  </div>
</body>
</html>
